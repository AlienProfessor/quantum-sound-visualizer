<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>量子音波 | Quantum Sound</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #000; overflow: hidden; font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', sans-serif; }
        #canvas-container { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; }

        /* 底部控制台 */
        .controls { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); display: flex; align-items: center; gap: 12px; padding: 12px 24px; background: rgba(20, 20, 25, 0.65); backdrop-filter: blur(30px) saturate(180%); -webkit-backdrop-filter: blur(30px) saturate(180%); border-radius: 56px; border: 1px solid rgba(255, 255, 255, 0.08); box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4); z-index: 100; }
        .btn { width: 44px; height: 44px; border-radius: 50%; border: none; background: transparent; color: white; font-size: 18px; cursor: pointer; display: flex; align-items: center; justify-content: center; position: relative; transition: transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1); }
        .btn-icon { position: relative; z-index: 1; transition: transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1); }
        .btn::before { content: ''; position: absolute; inset: 0; border-radius: 50%; background: rgba(255, 255, 255, 0.1); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); opacity: 0; transform: scale(0.8); transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1); }
        .btn:hover::before { opacity: 1; transform: scale(1); }
        .btn:hover .btn-icon { transform: scale(1.08); }
        .btn:active::before { background: rgba(255, 255, 255, 0.15); }
        .btn:active .btn-icon { transform: scale(0.95); }
        .btn.play { width: 52px; height: 52px; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); box-shadow: 0 4px 20px rgba(102, 126, 234, 0.4); }
        .btn.play::before { display: none; }
        .btn.play:hover { transform: scale(1.05); box-shadow: 0 6px 28px rgba(102, 126, 234, 0.5); }
        .btn.play:active { transform: scale(0.95); }
        .play-icon { width: 20px; height: 20px; position: relative; }
        .play-triangle { position: absolute; left: 2px; top: 50%; transform: translateY(-50%); width: 0; height: 0; border-top: 7px solid transparent; border-bottom: 7px solid transparent; border-left: 11px solid white; transition: all 0.25s cubic-bezier(0.34, 1.56, 0.64, 1); }
        .pause-bars { position: absolute; left: 50%; top: 50%; transform: translate(-50%, -50%); display: flex; gap: 3px; opacity: 0; width: 10px; height: 14px; transition: all 0.25s cubic-bezier(0.34, 1.56, 0.64, 1); }
        .pause-bar { width: 4px; height: 100%; background: white; border-radius: 2px; }
        .btn.play.playing .play-triangle { opacity: 0; transform: translateY(-50%) scaleX(0); width: 0; border-left-width: 0; }
        .btn.play.playing .pause-bars { opacity: 1; }
        .btn.play .play-triangle { opacity: 1; }
        .btn.play .pause-bars { opacity: 0; transform: translate(-50%, -50%) scaleX(0.5); }
        .progress-wrapper { position: relative; display: flex; align-items: center; padding: 12px 0; }
        .progress-container { width: 280px; height: 6px; background: rgba(255, 255, 255, 0.1); border-radius: 3px; cursor: pointer; position: relative; transition: height 0.3s ease, background 0.3s ease; }
        .progress-container:hover { height: 8px; background: rgba(255, 255, 255, 0.15); }
        .progress-container.dragging { height: 8px; }
        .progress-bar { height: 100%; background: linear-gradient(90deg, #667eea 0%, #764ba2 100%); border-radius: 3px; width: 0%; position: relative; pointer-events: none; }
        .progress-handle { position: absolute; top: 50%; right: -6px; transform: translateY(-50%) scale(0.8); width: 12px; height: 12px; background: white; border-radius: 50%; box-shadow: 0 2px 8px rgba(0, 0, 0, 0.3), 0 0 0 0 rgba(255, 255, 255, 0); opacity: 0; transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1); pointer-events: none; }
        .progress-container:hover .progress-handle, .progress-container.dragging .progress-handle { opacity: 1; transform: translateY(-50%) scale(1.3); box-shadow: 0 2px 12px rgba(102, 126, 234, 0.5), 0 0 0 4px rgba(102, 126, 234, 0.2); }
        .progress-container:not(:hover):not(.dragging) .progress-handle { opacity: 0; transform: translateY(-50%) scale(0.8); }
        .time { color: rgba(255, 255, 255, 0.6); font-size: 12px; min-width: 42px; font-variant-numeric: tabular-nums; font-weight: 500; transition: color 0.3s ease; }
        .time:hover { color: rgba(255, 255, 255, 0.9); }
        .info { position: fixed; top: 30px; left: 30px; color: rgba(255, 255, 255, 0.5); font-size: 13px; z-index: 100; }
        .info .title { font-size: 18px; font-weight: 600; color: white; margin-bottom: 8px; letter-spacing: 1px; }
        input[type="file"] { display: none; }
        .hint { position: fixed; bottom: 120px; left: 50%; transform: translateX(-50%); color: rgba(255, 255, 255, 0.3); font-size: 13px; pointer-events: none; }
        .loader { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; display: flex; align-items: center; justify-content: center; z-index: 1000; transition: opacity 0.5s; }
        .loader.hidden { opacity: 0; pointer-events: none; }
        .loader-text { color: rgba(255, 255, 255, 0.5); font-size: 14px; animation: pulse 1.5s ease-in-out infinite; }
        @keyframes pulse { 0%, 100% { opacity: 0.3; } 50% { opacity: 1; } }

        /* ========== 全新重构的右侧高级控制台 ========== */
        .settings-panel {
            position: fixed; right: 30px; top: 50%; transform: translateY(-50%);
            background: rgba(20, 20, 25, 0.65);
            backdrop-filter: blur(30px) saturate(180%);
            -webkit-backdrop-filter: blur(30px) saturate(180%);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 24px;
            padding: 24px;
            display: flex;
            flex-direction: column;
            gap: 24px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
            z-index: 100;
            width: 220px;
        }

        .settings-title {
            color: rgba(255, 255, 255, 0.9);
            font-size: 14px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 4px;
        }

        .param-row {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .param-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .param-label {
            color: rgba(255, 255, 255, 0.5);
            font-size: 12px;
            font-weight: 500;
        }

        .param-value {
            color: #667eea;
            font-size: 12px;
            font-weight: 600;
            font-variant-numeric: tabular-nums;
        }

        .horizontal-slider {
            -webkit-appearance: none;
            width: 100%;
            height: 4px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 2px;
            outline: none;
            transition: background 0.3s;
        }

        .horizontal-slider:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        .horizontal-slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 14px;
            height: 14px;
            background: white;
            border-radius: 50%;
            cursor: pointer;
            box-shadow: 0 2px 6px rgba(0, 0, 0, 0.4), 0 0 0 2px rgba(102, 126, 234, 0);
            transition: box-shadow 0.2s;
        }

        .horizontal-slider::-webkit-slider-thumb:hover {
            box-shadow: 0 2px 6px rgba(0, 0, 0, 0.4), 0 0 0 4px rgba(102, 126, 234, 0.3);
        }
    </style>
</head>
<body>
    <div id="canvas-container"></div>
    <div class="info">
        <div class="title">量子音波</div>
        <div id="status">等待音乐...</div>
    </div>

    <div class="settings-panel">
        <div class="settings-title">视觉中枢</div>

        <div class="param-row">
            <div class="param-header">
                <span class="param-label">星尘密度</span>
                <span class="param-value" id="detail-val">15k</span>
            </div>
            <input type="range" class="horizontal-slider" id="detail" min="5000" max="35000" step="1000" value="15000">
        </div>

        <div class="param-row">
            <div class="param-header">
                <span class="param-label">宇宙流速</span>
                <span class="param-value" id="flow-val">5.0</span>
            </div>
            <input type="range" class="horizontal-slider" id="flow" min="1" max="10" step="0.5" value="5">
        </div>

        <div class="param-row">
            <div class="param-header">
                <span class="param-label">基底色调</span>
                <span class="param-value" id="color-val">220°</span>
            </div>
            <input type="range" class="horizontal-slider" id="color" min="0" max="360" step="1" value="220">
        </div>
    </div>

    <div class="controls">
        <button class="btn" id="btn-file" title="选择音乐"><span class="btn-icon">📁</span></button>
        <input type="file" id="file-input" accept="audio/*">
        <button class="btn" id="btn-prev" title="快退 10s"><span class="btn-icon">⏮</span></button>

        <button class="btn play" id="btn-play" title="播放/暂停">
            <div class="play-icon">
                <div class="play-triangle"></div>
                <div class="pause-bars">
                    <div class="pause-bar"></div>
                    <div class="pause-bar"></div>
                </div>
            </div>
        </button>

        <button class="btn" id="btn-next" title="快进 10s"><span class="btn-icon">⏭</span></button>
        <span class="time" id="current-time">0:00</span>
        <div class="progress-wrapper">
            <div class="progress-container" id="progress-container">
                <div class="progress-bar" id="progress-bar"></div>
                <div class="progress-handle" id="progress-handle"></div>
            </div>
        </div>
        <span class="time" id="total-time">0:00</span>
        <button class="btn" id="btn-mic" title="麦克风"><span class="btn-icon">🎤</span></button>
    </div>

    <div class="hint">拖拽旋转视角 • 滚轮缩放</div>
    <div class="loader" id="loader"><div class="loader-text">初始化量子场...</div></div>

    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/build/three.min.js"></script>

    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/postprocessing/EffectComposer.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/postprocessing/RenderPass.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/postprocessing/ShaderPass.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/shaders/CopyShader.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/shaders/LuminosityHighPassShader.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/postprocessing/UnrealBloomPass.js"></script>

    <script src="/static/js/quantum.js"></script>
</body>
</html>
